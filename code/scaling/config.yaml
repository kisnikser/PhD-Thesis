common:
  seed: 42
  output_dir: code/output/scaling

model:
  input_dim: 784
  num_classes: 10

data:
  name: MNIST
  root: null
  batch_size: 128

experiment:
  device: cuda
  lr: 1.0e-3
  train_epochs: 100
  
  # Sample sizes - extended range with finer grid
  sample_sizes: [100, 200, 300, 500, 750, 1000, 1500, 2000, 3000, 5000, 7500, 10000, 15000, 20000, 30000]
  
  # MLP architectures: MLP-L-h (L layers, h hidden dim)
  # CNN architectures: CNN-L-c (L conv layers, c channels)
  architectures:
    # MLP architectures
    - name: "MLP-2-64"
      type: "MLP"
      num_layers: 2
      hidden_dim: 64
    - name: "MLP-2-128"
      type: "MLP"
      num_layers: 2
      hidden_dim: 128
    - name: "MLP-4-64"
      type: "MLP"
      num_layers: 4
      hidden_dim: 64
    - name: "MLP-4-128"
      type: "MLP"
      num_layers: 4
      hidden_dim: 128
    - name: "MLP-8-64"
      type: "MLP"
      num_layers: 8
      hidden_dim: 64
    # CNN architectures
    - name: "CNN-2-32"
      type: "CNN"
      num_layers: 2
      hidden_dim: 32
    - name: "CNN-2-64"
      type: "CNN"
      num_layers: 2
      hidden_dim: 64
    - name: "CNN-4-32"
      type: "CNN"
      num_layers: 4
      hidden_dim: 32
    - name: "CNN-4-64"
      type: "CNN"
      num_layers: 4
      hidden_dim: 64
    - name: "CNN-8-32"
      type: "CNN"
      num_layers: 8
      hidden_dim: 32
  
  # Criteria parameters for Delta estimation
  delta1_eps: 0.5
  delta1_num_directions: 100
  delta2_sigma: 0.5
  delta2_num_samples: 200
  
  # Curvature estimation parameters
  curvature_power_iters: 30
  curvature_max_samples: 500
  curvature_late_epochs: [90, 92, 94, 96, 98, 100]
  
  # Thresholds for sufficient sample size m*(epsilon)
  epsilon_thresholds: [0.1, 0.05, 0.01]
  
  num_seeds: 3
