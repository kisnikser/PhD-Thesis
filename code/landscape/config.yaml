common:
  seed: 42
  output_dir: code/output/landscape

model:
  input_dim: 784
  hidden_dim: 64
  num_layers: 2
  num_classes: 10

data:
  name: MNIST
  root: null
  batch_size: 128

experiment:
  device: cuda
  lr: 1.0e-3
  train_epochs: 100
  
  # Sample sizes to test (for each k, train model and measure Delta(k->k+1))
  # Dense grid to get good power-law fit
  sample_sizes: [100, 150, 200, 300, 400, 500, 700, 1000, 1500, 2000, 3000, 5000, 7000, 10000]
  
  # Delta_1 params
  delta1_eps: 0.5
  delta1_num_directions: 100
  
  # Delta_2 params
  delta2_sigma: 0.5
  delta2_num_samples: 200
  
  # Delta_2^(D) params
  subspace_dims: [5, 10, 20]
  top_eigenvec_iters: 50
  top_eigenvec_tol: 1.0e-4
  
  # Number of experiment repetitions
  num_seeds: 3
